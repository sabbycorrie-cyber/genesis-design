<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Genesis – Projects</title>

<link rel="stylesheet" href="styles/normalize.css">
<link rel="stylesheet" href="styles/index.css">

<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@200;400;700&display=swap" rel="stylesheet">
</head>

<body class="contact-page">

    <header>
    <div class="container header-container">

        <h1 class="logo">
            <img src="images/genesis-logo.svg" alt="Genesis logo">
        </h1>

        <nav class="nav">
            <a href="project-details.html">Projects</a>
            <a href="contact.html">Contact</a>
        </nav>

    </div>
</header>

<main>

<section class="contact-page">
    <div class="contact-top">

        <div class="contact-text">
            <h1>Contact</h1>
            <p>If you’d like to collaborate or just say hello,
            feel free to reach out.</p>
        </div>

<form class="contact-text">
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button type="submit">Send</button>
</form>

<div class="contact-map">
    <img src="images/img8.png" alt="Map" class="map-image">
</div>

</section>

</main>

<footer>
    <div class="container">

    <div class="footer-container">

    <h1 class="footer-left">
            <img src="images/genesis-logo.svg" alt="Genesis logo">
        </h1>

    <div class="footer-right">
        <nav class="footer-nav">
        <a href="project-details.html">Projects</a>
        <a href="contact.html">Contact</a>
        </nav>

        <div class="footer-social">
        <img src="images/dribble-logo.svg" alt="Dribble">
        <img src="images/instagram.svg" alt="Instagram">
        <img src="images/twitter.svg" alt="Twitter">
        </div>
    </div>

    </div>

</div>
</footer>

</body>
</html>
